name: BatchTwine
options:
  bundleIdPrefix: com.shimondeitel.cordagelog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  BatchTwine:
    type: application
    platform: iOS
    sources:
      - path: BatchTwine
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.cordagelog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: BatchTwine/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  BatchTwineTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BatchTwineTests
      - path: BatchTwine.storekit
    dependencies:
      - target: BatchTwine
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.cordagelog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  BatchTwineUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BatchTwineUITests
    dependencies:
      - target: BatchTwine
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.cordagelog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  BatchTwine:
    build:
      targets:
        BatchTwine: all
        BatchTwineTests: [test]
        BatchTwineUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: BatchTwine.storekit
    test:
      config: Debug
      storeKitConfiguration: BatchTwine.storekit
      targets:
        - BatchTwineTests
        - BatchTwineUITests
    archive:
      config: Release
